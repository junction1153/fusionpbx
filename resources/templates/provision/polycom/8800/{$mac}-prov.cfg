{if {$row.server_address|strstr:"pbx03.jcnt.net"}}{$c_sip_server_1_primary="pbx03.static.jcnt.net"}{/if}

{if {$row.server_address|strstr:"pbx02.jcnt.net"}}{$c_sip_server_1_secondary="pbx03.static.jcnt.net"}{/if}
