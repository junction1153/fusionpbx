		prov.polling.time="{$polycom_provision_polling_time}"
		feature.urlDialing.enabled="0"
		feature.logUpload.enabled="{$polycom_log_upload_enabled}"
		voice.aec.hf.enable="1"
		voice.aec.hs.enable="1"
