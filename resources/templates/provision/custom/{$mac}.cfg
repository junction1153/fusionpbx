                softkey.feature.directories="{$polycom_softkey_directory}"
                softkey.feature.endcall="{$polycom_softkey_endcall}"
                softkey.feature.newcall="0"
                softkey.feature.mystatus="0"
                softkey.feature.buddies="0"
                softkey.2.label="Redial"
