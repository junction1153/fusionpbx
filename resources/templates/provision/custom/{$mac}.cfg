		softkey.1.enable="{$poly_softkey_tovm_enable}"
		softkey.1.use.active="1"
		softkey.feature.doNotDisturb="{$poly_dnd}"
		{if isset($polycom_softkey_forward)}softkey.feature.forward="{$polycom_softkey_forward}"{/if}
